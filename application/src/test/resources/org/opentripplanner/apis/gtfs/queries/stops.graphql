{
  stops {
    gtfsId
    lat
    lon
    name
    vehicleMode
    allRoutes: routes {
      gtfsId
      longName
      shortName
    }
    routesWithinRange: routes(
      serviceDates: { start: "2024-09-10", end: "2024-09-10" }
    ) {
      gtfsId
      longName
      shortName
    }
    alerts {
      alertHeaderText
      alertDescriptionText
    }
    canceledCalls(
      serviceDateRanges: [{ start: "2024-08-08", end: "2024-08-10" }]
    ) {
      tripOnServiceDate {
        serviceDate
        trip {
          gtfsId
        }
      }
      stopCall {
        stopLocation {
          ... on Stop {
            gtfsId
          }
        }
        realTime {
          arrival {
            delay
          }
        }
      }
    }
  }
}
