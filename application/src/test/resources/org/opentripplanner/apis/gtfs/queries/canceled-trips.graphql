{
  canceledTrips(
    first: 2
    filters: [
      {
        include: [
          {
            modes: [BUS]
            serviceDateRanges: [{ start: "2024-08-09", end: "2024-08-10" }]
          }
        ]
      }
    ]
  ) {
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
    edges {
      node {
        serviceDate
        end {
          schedule {
            time {
              ... on ArrivalDepartureTime {
                arrival
              }
            }
          }
          realTime {
            arrival {
              delay
              time
            }
          }
          stopLocation {
            ... on Stop {
              gtfsId
            }
          }
        }
        start {
          schedule {
            time {
              ... on ArrivalDepartureTime {
                departure
              }
            }
          }
          realTime {
            departure {
              delay
              time
            }
          }
          stopLocation {
            ... on Stop {
              gtfsId
            }
          }
        }
        stopCalls {
          schedule {
            time {
              ... on ArrivalDepartureTime {
                arrival
                departure
              }
            }
          }
          realTime {
            arrival {
              delay
              time
            }
            departure {
              delay
              time
            }
          }
          stopLocation {
            ... on Stop {
              gtfsId
            }
          }
        }
        trip {
          gtfsId
        }
      }
    }
  }
}
