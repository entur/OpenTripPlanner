{
  canceledTripsSummary(
    filters: [
      {
        include: {
          modes: [BUS]
          serviceDateRanges: [{ start: "2024-01-01", end: "2024-09-01" }]
        }
      }
    ]
  ) {
    routes {
      route {
        gtfsId
      }
      cancellationCount
      patterns {
        cancellationCount
        pattern {
          code
        }
      }
    }
  }
}
